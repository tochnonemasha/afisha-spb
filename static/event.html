<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мероприятие — АФИША SPB</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0C0C0E;--surface:#141416;--surface2:#1C1C1F;--border:#2A2A2E;--accent:#C8A96E;--accent2:#E8C88E;--text:#F0EDE8;--muted:#888580;--red:#D64040}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;min-height:100vh}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer}

/* HEADER */
header{border-bottom:1px solid var(--border);padding:0 48px;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:100;background:rgba(12,12,14,0.96);backdrop-filter:blur(12px)}
.logo{font-family:'Playfair Display',serif;font-size:22px;font-weight:900;letter-spacing:0.08em;color:var(--accent)}
.logo span{color:var(--text);font-weight:400;font-size:13px;font-family:'IBM Plex Mono',monospace;margin-left:10px;opacity:0.45;letter-spacing:0.15em}
.back-btn{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:12px;font-family:'IBM Plex Mono',monospace;letter-spacing:0.1em;text-transform:uppercase;transition:color 0.2s}
.back-btn:hover{color:var(--accent)}
.back-btn::before{content:'←';font-size:16px}
.header-right{display:flex;gap:10px;align-items:center}
.btn-login{background:none;border:1px solid var(--border);color:var(--muted);padding:8px 18px;font-size:12px;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;font-family:'IBM Plex Mono',monospace;transition:all 0.2s}
.btn-login:hover{border-color:var(--muted);color:var(--text)}
.btn-reg{background:var(--accent);border:1px solid var(--accent);color:#000;padding:8px 18px;font-size:12px;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-weight:500;transition:all 0.2s}
.btn-reg:hover{background:var(--accent2)}

/* LOADING */
.page-loading{display:flex;justify-content:center;align-items:center;min-height:60vh;flex-direction:column;gap:16px}
.spinner{width:40px;height:40px;border:2px solid var(--border);border-top:2px solid var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--muted);letter-spacing:0.1em}

/* HERO */
.event-hero{position:relative;height:480px;overflow:hidden;background:var(--surface)}
.hero-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:brightness(0.4)}
.hero-img-placeholder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:var(--surface2)}
.hero-img-placeholder::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(-45deg,transparent,transparent 40px,rgba(200,169,110,0.03) 40px,rgba(200,169,110,0.03) 80px)}
.hero-letter{font-family:'Playfair Display',serif;font-size:220px;font-weight:900;color:rgba(200,169,110,0.08);line-height:1;user-select:none;position:relative;z-index:1}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to top, var(--bg) 0%, rgba(12,12,14,0.3) 60%, transparent 100%)}
.hero-content{position:absolute;bottom:0;left:0;right:0;padding:48px}
.event-cat-badge{display:inline-block;background:var(--accent);color:#000;font-size:10px;font-family:'IBM Plex Mono',monospace;letter-spacing:0.2em;text-transform:uppercase;padding:5px 12px;font-weight:500;margin-bottom:16px}
.event-title{font-family:'Playfair Display',serif;font-size:56px;font-weight:900;line-height:1.05;letter-spacing:-0.02em;margin-bottom:16px}
.event-meta-row{display:flex;gap:32px;align-items:center;flex-wrap:wrap}
.meta-item{display:flex;flex-direction:column;gap:4px}
.meta-label{font-size:9px;font-family:'IBM Plex Mono',monospace;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted)}
.meta-value{font-size:14px;font-family:'IBM Plex Mono',monospace;color:var(--text)}
.meta-value.accent{color:var(--accent)}
.age-badge{display:inline-flex;align-items:center;background:var(--surface2);border:1px solid var(--border);font-size:12px;font-family:'IBM Plex Mono',monospace;padding:3px 10px;color:var(--text)}

/* ACTIONS BAR */
.actions-bar{display:flex;gap:12px;padding:28px 48px;border-bottom:1px solid var(--border);align-items:center;flex-wrap:wrap;background:var(--surface)}
.btn-ticket{background:var(--accent);color:#000;border:none;padding:13px 36px;font-size:12px;letter-spacing:0.15em;text-transform:uppercase;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-weight:500;transition:all 0.2s}
.btn-ticket:hover{background:var(--accent2)}
.btn-fav-large{background:none;border:1px solid var(--border);color:var(--muted);padding:13px 24px;font-size:12px;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;font-family:'IBM Plex Mono',monospace;display:flex;align-items:center;gap:8px;transition:all 0.2s}
.btn-fav-large:hover,.btn-fav-large.active{border-color:var(--accent);color:var(--accent)}
.btn-share{background:none;border:1px solid var(--border);color:var(--muted);padding:13px 18px;font-size:13px;cursor:pointer;transition:all 0.2s}
.btn-share:hover{border-color:var(--text);color:var(--text)}
.price-large{margin-left:auto;text-align:right}
.price-large .from{font-size:10px;font-family:'IBM Plex Mono',monospace;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase}
.price-large .amount{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;color:var(--accent)}
.price-large .amount.free{font-size:20px}

/* LAYOUT */
.event-layout{display:grid;grid-template-columns:1fr 340px;border-bottom:1px solid var(--border)}
.event-main{padding:48px;border-right:1px solid var(--border)}
.event-side{padding:40px}

/* ABOUT */
.section-heading{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.event-description{font-size:14px;line-height:1.85;color:rgba(240,237,232,0.8);font-weight:300}
.event-description p{margin-bottom:14px}
.event-description p:last-child{margin-bottom:0}

/* DETAILS SIDEBAR */
.detail-row{padding:14px 0;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:5px}
.detail-row:first-child{padding-top:0}
.detail-key{font-size:9px;font-family:'IBM Plex Mono',monospace;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted)}
.detail-val{font-size:13px;color:var(--text)}
.detail-val a{color:var(--accent)}
.detail-val.accent{color:var(--accent);font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:500}

/* MAP SECTION */
.map-section{padding:48px;border-bottom:1px solid var(--border)}
.map-container{width:100%;height:280px;background:var(--surface2);position:relative;overflow:hidden;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;margin-top:20px}
.map-pin{text-align:center;position:relative;z-index:2}
.map-pin-icon{width:36px;height:36px;background:var(--accent);display:flex;align-items:center;justify-content:center;margin:0 auto 10px;font-size:16px;color:#000}
.map-addr{font-size:14px;font-weight:500;margin-bottom:4px;font-family:'Playfair Display',serif}
.map-sub{font-size:11px;font-family:'IBM Plex Mono',monospace;color:var(--muted)}
.map-link{display:inline-block;margin-top:12px;font-size:10px;font-family:'IBM Plex Mono',monospace;letter-spacing:0.12em;text-transform:uppercase;color:var(--accent);border-bottom:1px solid rgba(200,169,110,0.3);padding-bottom:2px}

/* SIMILAR */
.similar-section{padding:48px}
.similar-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);margin-top:24px}
.similar-card{background:var(--bg);padding:20px;cursor:pointer;transition:background 0.2s}
.similar-card:hover{background:var(--surface2)}
.sim-top{display:flex;justify-content:space-between;align-items:start;margin-bottom:8px}
.sim-cat{font-size:9px;font-family:'IBM Plex Mono',monospace;letter-spacing:0.15em;text-transform:uppercase;color:var(--accent)}
.sim-age{font-size:9px;font-family:'IBM Plex Mono',monospace;color:var(--muted);border:1px solid var(--border);padding:2px 5px}
.sim-title{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;line-height:1.25;margin-bottom:6px}
.sim-venue{font-size:11px;color:var(--muted);margin-bottom:10px}
.sim-price{font-size:12px;font-family:'IBM Plex Mono',monospace;color:var(--text)}
.sim-price em{font-style:normal;color:var(--muted);font-size:10px;margin-right:3px}
.sim-price.free{color:var(--accent)}

/* ERROR */
.error-page{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:50vh;gap:16px;color:var(--muted)}
.error-page h2{font-family:'Playfair Display',serif;font-size:32px;color:var(--text)}
.error-page .back-link{font-size:12px;font-family:'IBM Plex Mono',monospace;letter-spacing:0.1em;text-transform:uppercase;color:var(--accent);border-bottom:1px solid rgba(200,169,110,0.3)}

/* TAGS */
.tags-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:16px}
.tag-item{font-size:10px;font-family:'IBM Plex Mono',monospace;color:var(--muted);border:1px solid var(--border);padding:3px 8px}

/* FOOTER */
footer{border-top:1px solid var(--border);padding:28px 48px;display:flex;justify-content:space-between;align-items:center}
.footer-logo{font-family:'Playfair Display',serif;font-size:17px;font-weight:900;color:var(--accent)}
.footer-copy{font-size:10px;font-family:'IBM Plex Mono',monospace;color:rgba(136,133,128,0.4)}
</style>
</head>
<body>

<header>
  <a href="/" class="logo">АФИША <span>SPB</span></a>
  <a href="/" class="back-btn">Назад к афише</a>
  <div class="header-right" id="header-right">
    <button class="btn-login" id="btn-login" onclick="location.href='/login.html'">Войти</button>
    <button class="btn-reg" id="btn-reg" onclick="location.href='/register.html'">Регистрация</button>
  </div>
</header>

<div id="page-content">
  <div class="page-loading">
    <div class="spinner"></div>
    <div class="loading-text">Загрузка мероприятия...</div>
  </div>
</div>

<footer>
  <div class="footer-logo">АФИША · SPB</div>
  <div class="footer-copy">© 2025</div>
</footer>

<script>
const API_BASE_URL = 'https://afisha-spb-production.up.railway.app';

// Получаем ID из URL: event.html?id=123
function getEventId() {
    const params = new URLSearchParams(window.location.search);
    return params.get('id');
}

function mapCategory(cat) {
    if (!cat) return 'Другое';
    const c = cat.toLowerCase();
    if (c.includes('concert') || c.includes('музык')) return 'Концерт';
    if (c.includes('theater') || c.includes('спектакл')) return 'Театр';
    if (c.includes('exhibition') || c.includes('выставк')) return 'Выставка';
    if (c.includes('education') || c.includes('лекци') || c.includes('master')) return 'Лекция';
    if (c.includes('festival')) return 'Фестиваль';
    if (c.includes('sport')) return 'Спорт';
    if (c.includes('stand')) return 'Стендап';
    if (c.includes('excursion')) return 'Экскурсия';
    if (c.includes('party')) return 'Вечеринка';
    return cat;
}

function formatDate(dateStr) {
    if (!dateStr) return 'Дата не указана';
    try {
        const months = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
        const days = ['воскресенье','понедельник','вторник','среда','четверг','пятница','суббота'];
        const d = new Date(dateStr);
        if (isNaN(d.getTime())) return dateStr;
        const dayName = days[d.getDay()];
        const time = String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
        return d.getDate() + ' ' + months[d.getMonth()] + ' ' + d.getFullYear() + ', ' + dayName + ', ' + time;
    } catch {
        return dateStr;
    }
}

function formatPrice(event) {
    if (event.is_free || event.price_min === 0) {
        return { display: 'Бесплатно', from: '', isFree: true };
    }
    return {
        display: event.price_min.toLocaleString('ru') + ' ₽',
        from: 'от',
        isFree: false
    };
}

function renderEvent(e) {
    const category = mapCategory(e.category);
    const dateFormatted = formatDate(e.start_datetime);
    const price = formatPrice(e);
    const firstLetter = category.charAt(0);
    const tags = e.tags ? e.tags.split(',').map(t => t.trim()).filter(t => t.length > 0) : [];

    document.title = e.title + ' — АФИША SPB';

    const content = document.getElementById('page-content');
    content.innerHTML = `
      <!-- HERO -->
      <div class="event-hero">
        ${e.image_url ?
            `<img class="hero-img" src="${e.image_url}" alt="${e.title}">` :
            `<div class="hero-img-placeholder"><div class="hero-letter">${firstLetter}</div></div>`
        }
        <div class="hero-overlay"></div>
        <div class="hero-content">
          <div class="event-cat-badge">${category}</div>
          <h1 class="event-title">${e.title}</h1>
          <div class="event-meta-row">
            <div class="meta-item">
              <span class="meta-label">Дата</span>
              <span class="meta-value accent">${dateFormatted}</span>
            </div>
            ${e.venue_title ? `
            <div class="meta-item">
              <span class="meta-label">Место</span>
              <span class="meta-value">${e.venue_title}</span>
            </div>` : ''}
            ${e.age_restriction ? `
            <div class="meta-item">
              <span class="meta-label">Возраст</span>
              <span class="age-badge">${e.age_restriction}</span>
            </div>` : ''}
          </div>
        </div>
      </div>

      <!-- ACTIONS -->
      <div class="actions-bar">
        ${e.site_url ?
            `<button class="btn-ticket" onclick="window.open('${e.site_url}','_blank')">Купить билет</button>` :
            `<button class="btn-ticket">Купить билет</button>`
        }
        <button class="btn-fav-large" id="fav-btn" onclick="toggleFav()">⚑ В избранное</button>
        <button class="btn-share" onclick="shareEvent()">↗</button>
        <div class="price-large">
          <div class="from">${price.from}</div>
          <div class="amount ${price.isFree ? 'free' : ''}">${price.display}</div>
        </div>
      </div>

      <!-- LAYOUT -->
      <div class="event-layout">
        <!-- ЛЕВАЯ КОЛОНКА -->
        <div class="event-main">
          <h2 class="section-heading">О мероприятии</h2>
          <div class="event-description">
            ${e.description ?
                e.description.split('\n').filter(p => p.trim().length > 0).map(p => `<p>${p}</p>`).join('') :
                '<p>Описание мероприятия не указано.</p>'
            }
          </div>
          ${tags.length > 0 ? `
          <div class="tags-row">
            ${tags.map(t => `<span class="tag-item">${t}</span>`).join('')}
          </div>` : ''}
        </div>

        <!-- ПРАВАЯ КОЛОНКА — ДЕТАЛИ -->
        <div class="event-side">
          <h2 class="section-heading">Детали</h2>

          ${e.start_datetime ? `
          <div class="detail-row">
            <span class="detail-key">Дата и время</span>
            <span class="detail-val accent">${dateFormatted}</span>
          </div>` : ''}

          ${e.end_datetime ? `
          <div class="detail-row">
            <span class="detail-key">Окончание</span>
            <span class="detail-val">${formatDate(e.end_datetime)}</span>
          </div>` : ''}

          ${e.venue_title ? `
          <div class="detail-row">
            <span class="detail-key">Площадка</span>
            <span class="detail-val">${e.venue_title}</span>
          </div>` : ''}

          ${e.venue_address ? `
          <div class="detail-row">
            <span class="detail-key">Адрес</span>
            <span class="detail-val">${e.venue_address}</span>
          </div>` : ''}

          ${e.age_restriction ? `
          <div class="detail-row">
            <span class="detail-key">Возрастное ограничение</span>
            <span class="detail-val">${e.age_restriction}</span>
          </div>` : ''}

          <div class="detail-row">
            <span class="detail-key">Цена</span>
            <span class="detail-val accent">${price.isFree ? 'Бесплатно' : 'от ' + price.display}</span>
          </div>

          ${e.site_url ? `
          <div class="detail-row" style="border-bottom:none">
            <span class="detail-key">Сайт</span>
            <span class="detail-val"><a href="${e.site_url}" target="_blank">Перейти ↗</a></span>
          </div>` : ''}
        </div>
      </div>

      <!-- КАРТА -->
      ${e.venue_address ? `
      <div class="map-section">
        <h2 class="section-heading">Как добраться</h2>
        <div class="map-container">
          <div class="map-pin">
            <div class="map-pin-icon">⚲</div>
            <div class="map-addr">${e.venue_address}</div>
            ${e.venue_title ? `<div class="map-sub">${e.venue_title}</div>` : ''}
            <a class="map-link" href="https://yandex.ru/maps/?text=${encodeURIComponent(e.venue_address)}" target="_blank">
              Открыть в Яндекс Картах ↗
            </a>
          </div>
        </div>
      </div>` : ''}

      <!-- ПОХОЖИЕ -->
      <div class="similar-section" id="similar-section">
        <h2 class="section-heading" style="border:none;margin-bottom:0">Вам может понравиться</h2>
        <div class="similar-grid" id="similar-grid">
          <div style="grid-column:1/-1;padding:20px;color:var(--muted);font-size:12px;font-family:'IBM Plex Mono',monospace">Загрузка похожих событий...</div>
        </div>
      </div>
    `;

    // Загружаем похожие события
    loadSimilar(e.category, e.id);

    // Записываем просмотр если пользователь залогинен
    const userId = localStorage.getItem('user_id');
    if (userId) {
        recordInteraction(userId, e.id, 'view');
    }
}

async function loadSimilar(category, currentId) {
    try {
        const response = await fetch(`${API_BASE_URL}/api/events?category=${encodeURIComponent(category || '')}&limit=4`);
        if (!response.ok) return;
        const data = await response.json();

        const similar = data.events.filter(e => e.id !== currentId).slice(0, 3);
        const grid = document.getElementById('similar-grid');
        if (!grid || similar.length === 0) {
            if (grid) grid.innerHTML = '<div style="grid-column:1/-1;padding:20px;color:var(--muted);font-size:12px;font-family:IBM Plex Mono,monospace">Похожих событий не найдено</div>';
            return;
        }

        grid.innerHTML = similar.map(e => {
            const price = formatPrice(e);
            return `
            <div class="similar-card" onclick="location.href='event.html?id=${e.id}'">
                <div class="sim-top">
                    <span class="sim-cat">${mapCategory(e.category)}</span>
                    <span class="sim-age">${e.age_restriction || '0+'}</span>
                </div>
                <div class="sim-title">${e.title}</div>
                <div class="sim-venue">${e.venue_title || ''}</div>
                <div class="sim-price ${price.isFree ? 'free' : ''}">
                    ${price.isFree ? 'Бесплатно' : `<em>от</em>${price.display}`}
                </div>
            </div>`;
        }).join('');
    } catch(e) {
        console.error('Ошибка загрузки похожих:', e);
    }
}

async function recordInteraction(userId, eventId, type) {
    try {
        await fetch(`${API_BASE_URL}/api/interactions`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                user_id: parseInt(userId),
                event_id: parseInt(eventId),
                interaction_type: type
            })
        });
    } catch(e) {}
}

function toggleFav() {
    const btn = document.getElementById('fav-btn');
    if (!btn) return;
    btn.classList.toggle('active');

    const userId = localStorage.getItem('user_id');
    const eventId = getEventId();
    if (userId && eventId) {
        const type = btn.classList.contains('active') ? 'favorite' : 'view';
        recordInteraction(userId, eventId, type);
    }

    btn.textContent = btn.classList.contains('active') ? '⚑ В избранном' : '⚑ В избранное';
}

function shareEvent() {
    if (navigator.share) {
        navigator.share({ title: document.title, url: window.location.href });
    } else {
        navigator.clipboard.writeText(window.location.href);
        alert('Ссылка скопирована в буфер обмена');
    }
}

// Загрузка данных мероприятия
async function loadEvent() {
    const id = getEventId();
    if (!id) {
        document.getElementById('page-content').innerHTML = `
            <div class="error-page">
                <h2>Мероприятие не найдено</h2>
                <p>ID мероприятия не указан</p>
                <a href="/" class="back-link">← Вернуться к афише</a>
            </div>`;
        return;
    }

    try {
        const response = await fetch(`${API_BASE_URL}/api/events/${id}`);
        if (response.ok) {
            const event = await response.json();
            renderEvent(event);
        } else if (response.status === 404) {
            document.getElementById('page-content').innerHTML = `
                <div class="error-page">
                    <h2>Мероприятие не найдено</h2>
                    <p>Возможно, оно уже завершилось или было удалено</p>
                    <a href="/" class="back-link">← Вернуться к афише</a>
                </div>`;
        } else {
            document.getElementById('page-content').innerHTML = `
                <div class="error-page">
                    <h2>Ошибка загрузки</h2>
                    <p>Попробуйте обновить страницу</p>
                    <a href="/" class="back-link">← Вернуться к афише</a>
                </div>`;
        }
    } catch(error) {
        document.getElementById('page-content').innerHTML = `
            <div class="error-page">
                <h2>Нет соединения</h2>
                <p>Проверьте интернет и попробуйте снова</p>
                <a href="/" class="back-link">← Вернуться к афише</a>
            </div>`;
    }
}

// === АВТОРИЗАЦИЯ В ХЕДЕРЕ ===
function updateHeader() {
    const userId = localStorage.getItem('user_id');
    const userName = localStorage.getItem('user_name');
    const loginBtn = document.getElementById('btn-login');
    const regBtn = document.getElementById('btn-reg');
    if (!loginBtn || !regBtn) return;

    if (userId && userName) {
        loginBtn.textContent = userName.split(' ')[0];
        loginBtn.onclick = () => window.location.href = '/lk.html';
        loginBtn.style.borderColor = 'var(--accent)';
        loginBtn.style.color = 'var(--accent)';
        regBtn.textContent = 'Выйти';
        regBtn.style.background = 'none';
        regBtn.style.border = '1px solid var(--border)';
        regBtn.style.color = 'var(--muted)';
        regBtn.onclick = () => {
            localStorage.removeItem('user_id');
            localStorage.removeItem('user_name');
            localStorage.removeItem('user_email');
            localStorage.removeItem('user_type');
            location.reload();
        };
    }
}

updateHeader();
loadEvent();
</script>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вход — АФИША SPB</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0C0C0E;--surface:#141416;--surface2:#1C1C1F;--border:#2A2A2E;--accent:#C8A96E;--accent2:#E8C88E;--text:#F0EDE8;--muted:#888580;--red:#D64040}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column}
a{color:inherit;text-decoration:none}

header{border-bottom:1px solid var(--border);padding:0 48px;display:flex;align-items:center;justify-content:space-between;height:64px;background:rgba(12,12,14,0.96);backdrop-filter:blur(12px)}
.logo{font-family:'Playfair Display',serif;font-size:22px;font-weight:900;letter-spacing:0.08em;color:var(--accent)}
.logo span{color:var(--text);font-weight:400;font-size:13px;font-family:'IBM Plex Mono',monospace;margin-left:10px;opacity:0.45;letter-spacing:0.15em}
.back-link{font-size:12px;font-family:'IBM Plex Mono',monospace;letter-spacing:0.08em;color:var(--muted);transition:color 0.2s}
.back-link:hover{color:var(--accent)}

.main{flex:1;display:flex;align-items:center;justify-content:center;padding:48px}
.login-box{width:100%;max-width:440px}
.login-title{font-family:'Playfair Display',serif;font-size:40px;font-weight:900;margin-bottom:8px}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:40px;font-weight:300}

.field{margin-bottom:20px}
.field-label{display:block;font-size:10px;font-family:'IBM Plex Mono',monospace;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.field-input{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:13px 16px;font-size:14px;font-family:'IBM Plex Sans',sans-serif;outline:none;transition:border-color 0.2s}
.field-input:focus{border-color:var(--accent)}
.field-input::placeholder{color:rgba(136,133,128,0.5)}

.btn-submit{width:100%;background:var(--accent);border:none;color:#000;padding:15px;font-size:12px;letter-spacing:0.2em;text-transform:uppercase;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-weight:500;transition:all 0.2s;margin-top:8px}
.btn-submit:hover{background:var(--accent2)}
.btn-submit:disabled{opacity:0.5;cursor:not-allowed}

.divider{display:flex;align-items:center;gap:16px;margin:24px 0}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.divider span{font-size:11px;font-family:'IBM Plex Mono',monospace;color:var(--muted);letter-spacing:0.1em}

.btn-register{width:100%;background:none;border:1px solid var(--border);color:var(--muted);padding:13px;font-size:12px;letter-spacing:0.15em;text-transform:uppercase;cursor:pointer;font-family:'IBM Plex Mono',monospace;transition:all 0.2s}
.btn-register:hover{border-color:var(--accent);color:var(--accent)}

.error-msg{background:rgba(214,64,64,0.1);border:1px solid rgba(214,64,64,0.3);color:var(--red);padding:12px 16px;font-size:13px;margin-bottom:20px;display:none}
.error-msg.show{display:block}

footer{border-top:1px solid var(--border);padding:24px 48px;display:flex;justify-content:space-between;align-items:center}
.footer-logo{font-family:'Playfair Display',serif;font-size:16px;font-weight:900;color:var(--accent)}
.footer-copy{font-size:10px;font-family:'IBM Plex Mono',monospace;color:rgba(136,133,128,0.4)}
</style>
</head>
<body>

<header>
  <a href="/" class="logo">АФИША <span>SPB</span></a>
  <a href="/" class="back-link">← К афише</a>
</header>

<main class="main">
  <div class="login-box">
    <h1 class="login-title">Добро<br>пожаловать</h1>
    <p class="login-sub">Войдите чтобы получать персональные рекомендации</p>

    <div class="error-msg" id="error-msg"></div>

    <div class="field">
      <label class="field-label">Email</label>
      <input type="email" id="email" class="field-input" placeholder="your@email.com" autocomplete="email">
    </div>

    <div class="field">
      <label class="field-label">Пароль</label>
      <input type="password" id="password" class="field-input" placeholder="Ваш пароль" autocomplete="current-password">
    </div>

    <button class="btn-submit" id="login-btn" onclick="doLogin()">Войти</button>

    <div class="divider"><span>или</span></div>

    <button class="btn-register" onclick="location.href='/register.html'">Создать аккаунт</button>
  </div>
</main>

<footer>
  <div class="footer-logo">АФИША · SPB</div>
  <div class="footer-copy">© 2025</div>
</footer>

<script>
const API_BASE_URL = 'https://afisha-spb-production.up.railway.app';

if (localStorage.getItem('user_id')) {
  window.location.href = '/';
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.classList.add('show');
}

function hideError() {
  document.getElementById('error-msg').classList.remove('show');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

async function doLogin() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  if (!email || !password) {
    showError('Заполните email и пароль');
    return;
  }

  const btn = document.getElementById('login-btn');
  btn.disabled = true;
  btn.textContent = 'Вход...';
  hideError();

  try {
    const response = await fetch(API_BASE_URL + '/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });

    const data = await response.json();

    if (response.ok) {
      localStorage.setItem('user_id', data.user.id);
      localStorage.setItem('user_name', data.user.name);
      localStorage.setItem('user_email', data.user.email);
      localStorage.setItem('user_type', data.user.user_type);
      window.location.href = '/';
    } else {
      showError(data.detail || 'Неверный email или пароль');
      btn.disabled = false;
      btn.textContent = 'Войти';
    }
  } catch(e) {
    showError('Ошибка соединения с сервером');
    btn.disabled = false;
    btn.textContent = 'Войти';
  }
}
</script>
</body>
</html>
